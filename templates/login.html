{% load static %}

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar sesión</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <!-- Tu hoja de estilos -->
    <link rel="stylesheet" href="{% static 'hola/estilos.css' %}">
</head>

<body class="bg-light">
<div class="text-center mb-4">
    <img src="{% static 'hola/img/portada.png' %}"
         alt="Cabecera"
         style="width: 100%; max-height: 200px; object-fit: cover;">
</div>


<div class="container mt-5" style="max-width: 400px;">

    <h2 class="text-center mb-4">Iniciar sesión</h2>

    {% if error %}
        <p class="text-danger text-center">{{ error }}</p>
    {% endif %}

    <form method="POST" class="card p-4 shadow-sm">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Usuario" class="form-control mb-3">
        <input type="password" name="password" placeholder="Contraseña" class="form-control mb-3">
        <button class="btn btn-primary w-100 boton-verde">Entrar</button>
    </form>

    <p class="mt-3 text-center">
        ¿No tienes cuenta?
        <a href="/registro/">Regístrate aquí</a>
    </p>

</div>

</body>
</html>
