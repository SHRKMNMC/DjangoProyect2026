{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Editar alerta</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Estilos propios -->
    <link rel="stylesheet" href="{% static 'hola/estilos.css' %}">

    <style>
        body {
            background-color: #f5f7fa;
            font-family: 'Segoe UI', sans-serif;
        }

        .header-img {
            width: 100%;
            max-height: 220px;
            object-fit: cover;
            border-bottom: 4px solid #ffc107;
        }

        .edit-card {
            border-radius: 14px;
            transition: all 0.25s ease-in-out;
        }

        .edit-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.12);
        }
    </style>
</head>

<body>

<!-- Portada -->
<div class="text-center mb-4">
    <img src="{% static 'hola/img/portada.png' %}" alt="Cabecera" class="header-img">
</div>

<!-- Botón volver -->
<div class="text-left my-3 ms-3">
    <a href="/hola/" class="boton-verde btn d-inline-block px-4">Volver</a>
</div>

<div class="container mt-4">

    <!-- Título -->
    <h1 class="fw-bold mb-4">Editar alerta</h1>

    <!-- Tarjeta -->
    <div class="card p-4 shadow-sm edit-card">

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="boton-verde btn px-4" type="submit">Guardar cambios</button>
        </form>

    </div>

</div>

<!-- Footer -->
<footer class="mt-5 text-center py-3 bg-white border-top">
    <a href="/logout/" class="btn btn-danger px-4">Cerrar sesión</a>
</footer>

</body>
</html>
