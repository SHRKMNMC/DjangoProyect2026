{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Resolver alerta</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Estilos propios -->
    <link rel="stylesheet" href="{% static 'hola/estilos.css' %}">

    <style>
        body {
            background-color: #f5f7fa;
            font-family: 'Segoe UI', sans-serif;
        }

        .header-img {
            width: 100%;
            max-height: 220px;
            object-fit: cover;
            border-bottom: 4px solid #dc3545;
        }

        .resolver-card {
            border-radius: 14px;
            transition: all 0.25s ease-in-out;
        }

        .resolver-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.12);
        }

        textarea {
            resize: none;
        }
    </style>
</head>

<body>

<!-- Portada -->
<div class="text-center mb-4">
    <img src="{% static 'hola/img/portada.png' %}" alt="Cabecera" class="header-img">
</div>

<!-- Botón volver -->
<div class="text-left my-3 ms-3">
    <a href="/hola/" class="boton-verde btn d-inline-block px-4">Volver</a>
</div>

<div class="container mt-4">

    <!-- Título -->
    <h1 class="fw-bold mb-4">Resolver alerta</h1>

    <!-- Tarjeta -->
    <div class="card p-4 shadow-sm resolver-card">

        <p class="fs-5"><b>{{ mensaje.texto }}</b></p>

        {% if mensaje.descripcion %}
            <p><b>Descripción:</b> {{ mensaje.descripcion }}</p>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <label class="mb-2"><b>Solución:</b></label>
            <textarea name="solucion" class="form-control" rows="4" required></textarea>

            <button class="btn btn-success mt-3 px-4">Marcar como resuelta</button>
        </form>

    </div>

</div>

<!-- Footer -->
<footer class="mt-5 py-3 border-top bg-white">
    <div class="container d-flex justify-content-between align-items-center">

        <!-- Botón a la izquierda -->
        <a href="/logout/" class="btn btn-danger px-4">Cerrar sesión</a>

        <!-- Info del sistema a la derecha -->
        <div class="text-muted small">
            <strong>Versión {{ VERSION_APP }}</strong> · Panel personal · {{ user.username }}
        </div>

    </div>
</footer>
</body>
</html>
