{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Nueva conversación</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Estilos propios -->
    <link rel="stylesheet" href="{% static 'hola/estilos.css' %}">

    <style>
        body {
            background-color: #f5f7fa;
            font-family: 'Segoe UI', sans-serif;
        }

        .header-img {
            width: 100%;
            max-height: 220px;
            object-fit: cover;
            border-bottom: 4px solid #0d6efd;
        }

        .user-item {
            border-radius: 12px !important;
            margin-bottom: 10px;
            border: 1px solid #e3e6ea;
            transition: all 0.2s ease-in-out;
            padding: 14px;
            font-size: 1.1rem;
        }

        .user-item:hover {
            background-color: #eef6ff;
            transform: translateY(-3px);
            box-shadow: 0 6px 18px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>

<!-- Portada -->
<div class="text-center mb-4">
    <img src="{% static 'hola/img/portada.png' %}" class="header-img">
</div>

<!-- Botones -->
<div class="d-flex gap-2 my-3 ms-3">
    <a href="/mensajes/" class="boton-verde btn px-4">Volver</a>
</div>

<div class="container mt-4">

    <!-- Título -->
    <h1 class="fw-bold mb-4">Iniciar conversación</h1>

    <!-- Lista de usuarios -->
    <form method="POST">
        {% csrf_token %}
        <div class="list-group">
            {% for u in usuarios %}
                <button name="usuario_id" value="{{ u.id }}" class="list-group-item user-item">
                    {{ u.username }}
                </button>
            {% empty %}
                <p class="text-muted">No hay otros usuarios disponibles.</p>
            {% endfor %}
        </div>
    </form>

</div>

</body>
</html>
