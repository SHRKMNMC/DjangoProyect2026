{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Resumen de usuarios</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'hola/estilos.css' %}">

    <style>
        body {
            background-color: #f5f7fa;
            font-family: 'Segoe UI', sans-serif;
        }

        .header-img {
            width: 100%;
            max-height: 220px;
            object-fit: cover;
            border-bottom: 4px solid #198754;
        }

        .table-card {
            border-radius: 14px;
            transition: all 0.25s ease-in-out;
        }

        .table-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.12);
        }

        .table-container {
            overflow-x: auto;
        }
    </style>
</head>

<body>

<!-- Cabecera -->
<div class="text-center mb-4">
    <img src="{% static 'hola/img/portada.png' %}" class="header-img">
</div>

<!-- Botón volver -->
<div class="text-left my-3 ms-3">
    <a href="/datos/" class="boton-verde btn px-4">Volver</a>
</div>

<div class="container mt-4">

    <h1 class="fw-bold mb-4">Resumen de usuarios</h1>

    <!-- Tabla -->
    <div class="card p-4 shadow-sm table-card mb-4">
        <div class="table-container">
            {{ tabla|safe }}
        </div>
    </div>

    <!-- Gráfica -->
    {% if grafica %}
    <div class="card p-4 shadow-sm table-card mb-4">
        <h3 class="fw-bold mb-3">Gráfica del resumen</h3>
        <img src="data:image/png;base64,{{ grafica }}" class="img-fluid">
    </div>
    {% endif %}

</div>

<!-- Footer -->
<footer class="mt-5 py-3 border-top bg-white">
    <div class="container d-flex justify-content-between align-items-center">

        <!-- Botón a la izquierda -->
        <a href="/logout/" class="btn btn-danger px-4">Cerrar sesión</a>

        <!-- Info del sistema a la derecha -->
        <div class="text-muted small">
            <strong>Versión {{ VERSION_APP }}</strong> · Panel personal · {{ user.username }}
        </div>

    </div>
</footer>
</body>
</html>
