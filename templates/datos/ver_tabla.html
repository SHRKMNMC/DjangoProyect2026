{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>{{ tabla.nombre }}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'hola/estilos.css' %}">

    <style>
        body {
            background-color: #f5f7fa;
            font-family: 'Segoe UI', sans-serif;
        }

        .header-img {
            width: 100%;
            max-height: 220px;
            object-fit: cover;
            border-bottom: 4px solid #198754;
        }

        .table-card {
            border-radius: 14px;
            transition: all 0.25s ease-in-out;
        }

        .table-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.12);
        }

        .table-container {
            overflow-x: auto;
        }

    </style>
</head>

<body>

<div class="text-center mb-4">
    <img src="{% static 'hola/img/portada.png' %}" alt="Cabecera" class="header-img">
</div>

<div class="text-left my-3 ms-3">
    <a href="/datos/" class="boton-verde btn d-inline-block px-4">Volver</a>
</div>

<div class="container mt-4">

    <h1 class="fw-bold mb-4">{{ tabla.nombre }}</h1>

    <div class="card p-4 shadow-sm table-card mb-4">
        <h3 class="fw-bold mb-3">Tabla</h3>
        <div class="table-container">
            {{ tabla.tabla_html|safe }}
        </div>
    </div>

    <div class="row">
    {% for g in graficas %}
        <div class="col-md-6 mb-4">
            <div class="card p-4 shadow-sm table-card h-100">
                <img src="data:image/png;base64,{{ g.imagen }}" class="img-fluid">
            </div>
        </div>
    {% endfor %}
</div>


</div>

<footer class="mt-5 text-center py-3 bg-white border-top">
    <a href="/logout/" class="btn btn-danger px-4">Cerrar sesión</a>
</footer>

</body>
</html>
