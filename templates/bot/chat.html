{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Chat Bot</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Estilos propios -->
    <link rel="stylesheet" href="{% static 'hola/estilos.css' %}">

    <style>
        body {
            background-color: #f5f7fa;
            font-family: 'Segoe UI', sans-serif;
        }

        .header-img {
            width: 100%;
            max-height: 220px;
            object-fit: cover;
            border-bottom: 4px solid #0d6efd;
        }

        .chat-card {
            border-radius: 14px;
            transition: all 0.25s ease-in-out;
        }

        .chat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.12);
        }

        .chat-box {
            max-height: 350px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .msg {
            padding: 10px 14px;
            border-radius: 12px;
            margin-bottom: 10px;
            max-width: 80%;
        }

        .msg-user {
            background-color: #d1e7dd;
            align-self: flex-end;
        }

        .msg-bot {
            background-color: #e2e3e5;
            align-self: flex-start;
        }

        .msg-author {
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 2px;
        }
    </style>
</head>

<body>

<!-- Cabecera -->
<div class="text-center mb-4">
    <img src="{% static 'hola/img/portada.png' %}" alt="Cabecera" class="header-img">
</div>

<!-- Botón volver -->
<div class="text-left my-3 ms-3">
    <a href="/" class="boton-verde btn d-inline-block px-4">Ir a inicio</a>
</div>

<div class="container mt-4">

    <!-- Título -->
    <h1 class="fw-bold mb-4">Chat con el Bot</h1>

    <!-- Tarjeta del chat -->
    <div class="card p-4 mb-4 shadow-sm chat-card">

        <!-- Mensajes -->
        <div class="chat-box d-flex flex-column">

            {% for m in mensajes %}
                <div class="msg {% if m.autor == 'Usuario' %}msg-user{% else %}msg-bot{% endif %}">
                    <div class="msg-author">{{ m.autor }}</div>
                    <div>{{ m.texto }}</div>
                </div>
            {% empty %}
                <p class="text-muted">No hay mensajes todavía.</p>
            {% endfor %}

        </div>

        <!-- Formulario -->
        <form method="POST" class="mt-3">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="boton-verde btn px-4" type="submit">Enviar</button>
        </form>

    </div>

</div>

<!-- Botón borrar chat -->
<div class="text-center mb-4">
    <a href="{% url 'borrar_chat' %}" class="btn btn-danger px-4">Borrar chat</a>
</div>

<!-- Footer -->
<footer class="mt-5 text-center py-3 bg-white border-top">
    <a href="/logout/" class="btn btn-danger px-4">Cerrar sesión</a>
</footer>

</body>
</html>
